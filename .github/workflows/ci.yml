name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-test-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter (includes Dart)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze .

      - name: Activate coverage tool
        run: dart pub global activate coverage

      # Ratchet gate: prevents coverage regressions. Total is ~99.6% (9 of 12
      # packages at 100%; anthropic, openai_compatible, and flutter_ui sit at
      # ~97-99% on defensive/unreachable branches). Raise toward 100 as those close.
      - name: Test with coverage (gate)
        run: tool/coverage.sh 99
