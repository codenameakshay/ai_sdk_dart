name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-test-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter (includes Dart)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze .

      - name: Activate coverage tool
        run: dart pub global activate coverage

      # Ratchet gate: prevents coverage regressions. Target is 100%; raise this
      # as the remaining packages (ai_sdk_dart, google, cohere, mcp) are covered.
      - name: Test with coverage (gate)
        run: tool/coverage.sh 85
