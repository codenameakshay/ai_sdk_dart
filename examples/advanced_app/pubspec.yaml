name: advanced_app
description: Advanced Flutter example for AI SDK Dart — demonstrates all providers, tools, image gen, multimodal, embeddings, TTS, STT.
publish_to: none
version: 1.0.0+1
resolution: workspace

environment:
  sdk: ^3.11.1
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  ai: ^0.2.0
  ai_sdk_provider: ^0.2.0
  ai_sdk_openai: ^0.2.0
  ai_sdk_anthropic: ^0.2.0
  ai_sdk_google: ^0.2.0
  ai_sdk_flutter: ^0.2.0
  image_picker: ^1.0.7
  record: ^6.2.0
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
