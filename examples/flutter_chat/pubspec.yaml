name: flutter_chat
description: Flutter example app for AI SDK Dart — demonstrates ChatController, CompletionController, and ObjectStreamController.
publish_to: none
version: 1.0.0+1
resolution: workspace

environment:
  sdk: ^3.11.1
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  ai_sdk: ^0.2.0
  ai_sdk_openai: ^0.2.0
  ai_sdk_flutter_ui: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
